<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送子鳥 × HAY | 限定優惠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F9F8F4; color: #333; }
    </style>
    
    <script>
        window.onload = function() {
            const password = prompt("請輸入送子鳥邀請碼：");
            if (password !== "stork888") {
                alert("密碼錯誤，將導回首頁");
                window.location.href = "https://www.stork.com.tw/";
            }
        };

        function order(productName) {
            const message = "您好，我想預訂【" + productName + "】組合。";
            alert(message + "\n\n(系統即將導向預約登記表單)");
            // 請記得將下方連結替換為您的實際表單網址
            window.open("https://docs.google.com/forms/d/e/1FAIpQLSfMJN09-IEJ-3DiNYYiqCWelztKaOmp305_hpbOMk0QG0watw/viewform?usp=sf_link", "_blank");
        }
    </script>
</head>
<body>

    <header class="py-20 px-10 text-center">
        <h1 class="text-4xl font-light tracking-widest mb-4">HAY at STORK</h1>
        <p class="text-gray-400 italic font-light">給勇敢且優雅的妳 — 限量聯名組合</p>
        <div class="mt-4 text-xs text-gray-400 tracking-wider">活動期間：2026.04.01 - 2026.09.01</div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid md:grid-cols-3 gap-12">
            
            <div class="bg-white p-8 shadow-sm hover:shadow-md transition-shadow duration-300 border border-stone-100">
                <div class="bg-gray-50 aspect-square mb-6 flex items-center justify-center">
                    <img src="hay1.jpg" alt="暖心哺育組" class="max-h-full max-w-full object-contain">
                    </div>
                <h3 class="text-xl mb-2 font-bold text-stone-800">暖心哺育組</h3>
                <p class="text-xs text-gray-400 mb-4 leading-relaxed">PAO 奶油白便攜燈 + 專屬蛋寶</p>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[10px] line-through text-gray-300">NT$ 5,680</span>
                        <p class="text-2xl font-bold text-red-800">NT$ 5,112</p>
                    </div>
                    <span class="text-[10px] bg-yellow-50 text-yellow-600 px-2 py-1 mb-1 border border-yellow-100">現貨僅 2 組</span>
                </div>
                <button onclick="order('暖心哺育組')" class="w-full mt-6 bg-stone-800 text-white py-3 text-sm tracking-widest hover:bg-stone-700 transition-colors">立即預約領取</button>
            </div>

            <div class="bg-white p-8 shadow-sm hover:shadow-md transition-shadow duration-300 border border-stone-100 border-l-4 border-l-green-100">
                <div class="bg-gray-50 aspect-square mb-6 flex items-center justify-center">
                    <img src="hay2.jpg" alt="自然有機組" class="max-h-full max-w-full object-contain">
                </div>
                <h3 class="text-xl mb-2 font-bold text-stone-800">自然有機組</h3>
                <p class="text-xs text-gray-400 mb-4 leading-relaxed">抹茶綠浴巾 + 毛巾 + 蛋寶</p>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[10px] line-through text-gray-300">NT$ 3,280</span>
                        <p class="text-2xl font-bold text-red-800">NT$ 2,952</p>
                    </div>
                    <span class="text-[10px] bg-stone-50 text-stone-500 px-2 py-1 mb-1 border border-stone-100">限量現貨</span>
                </div>
                <button onclick="order('自然有機組')" class="w-full mt-6 bg-stone-800 text-white py-3 text-sm tracking-widest hover:bg-stone-700 transition-colors">立即預約領取</button>
            </div>

            <div class="bg-white p-8 shadow-sm hover:shadow-md transition-shadow duration-300 border border-stone-100 border-l-4 border-l-blue-100">
                <div class="bg-gray-50 aspect-square mb-6 flex items-center justify-center">
                    <img src="hay3.jpg" alt="職人辦公組" class="max-h-full max-w-full object-contain">
                </div>
                <h3 class="text-xl mb-2 font-bold text-stone-800">職人辦公組</h3>
                <p class="text-xs text-gray-400 mb-4 leading-relaxed">海軍藍托特包 + 筷子組</p>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[10px] line-through text-gray-300">NT$ 1,500</span>
                        <p class="text-2xl font-bold text-red-800">NT$ 1,350</p>
                    </div>
                    <span class="text-[10px] bg-yellow-50 text-yellow-600 px-2 py-1 mb-1 border border-yellow-100">現貨 2 組</span>
                </div>
                <button onclick="order('職人辦公組')" class="w-full mt-6 bg-stone-800 text-white py-3 text-sm tracking-widest hover:bg-stone-700 transition-colors">立即預約領取</button>
            </div>

        </div>
    </main>

    <footer class="text-center pb-20 text-gray-400 text-[10px] leading-loose tracking-wider">
        <p>● 本頁面僅供預約登記，請至櫃檯現場付款領取</p>
        <p>● 套組品項皆不拆售，數量有限售完為止</p>
    </footer>

</body>
</html>
