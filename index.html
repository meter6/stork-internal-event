<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAY at IART | 全品項預訂系統</title>
<style>
/* CSS 保持不變，已確認支援 btn-special 視覺效果 */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif; background:#F9F8F4; color:#333; font-size:14px; line-height:1.6; }
#pw-gate { position:fixed; inset:0; background:#F9F8F4; display:flex; align-items:center; justify-content:center; z-index:999; }
.pw-box { background:#fff; border:1px solid #ddd; border-radius:10px; padding:2.5rem 2rem; text-align:center; width:320px; }
.pw-box h2 { font-size:18px; font-weight:300; letter-spacing:0.2em; margin-bottom:6px; }
.pw-box p { font-size:12px; color:#999; margin-bottom:1.5rem; }
.pw-box input { width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px; font-family:inherit; margin-bottom:10px; text-align:center; letter-spacing:0.15em; }
.pw-btn { width:100%; padding:10px; background:#111; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; }
header { text-align:center; padding:3rem 1.5rem 1.5rem; background:#fff; border-bottom:1px solid #eee; }
header h1 { font-size:1.8rem; font-weight:300; letter-spacing:0.3em; margin-bottom:6px; }
.notice { max-width:560px; margin:1.2rem auto 0; background:#f5f4ef; border:1px solid #ddd; border-radius:8px; padding:1rem 1.25rem; font-size:12px; color:#555; text-align:left; }
nav { display:flex; justify-content:center; background:#fff; border-bottom:1px solid #eee; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.tab-btn { padding:14px 24px; font-size:13px; border:none; border-bottom:2px solid transparent; background:transparent; color:#888; cursor:pointer; }
.tab-btn.active { color:#111; border-bottom-color:#111; font-weight:700; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.wrap { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
.section-title { text-align:center; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#aaa; margin-bottom:6px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:680px; margin:0 auto; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:860px){ .grid-3,.grid-4 { grid-template-columns:repeat(2,1fr); } }
@media(max-width:520px){ .grid-3,.grid-2,.grid-4 { grid-template-columns:1fr; } }
.card { background:#fff; border:1px solid #eee; border-radius:8px; padding:1.25rem; display:flex; flex-direction:column; gap:8px; transition:box-shadow 0.2s; }
.card:hover { box-shadow:0 6px 20px rgba(0,0,0,0.08); }
.img-box { background:#f3f4f6; border-radius:6px; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.img-box img { max-width:100%; max-height:100%; object-fit:contain; }
select { width:100%; font-size:11px; padding:6px 8px; border:1px solid #ddd; border-radius:6px; }
.price-row { display:flex; align-items:baseline; gap:8px; margin-top:auto; }
.price-orig { font-size:12px; color:#bbb; text-decoration:line-through; }
.price-disc { font-size:16px; font-weight:700; color:#991b1b; }
.price-special { font-size:16px; font-weight:700; color:#78716c; }
.btn { width:100%; padding:9px 12px; font-size:11px; border-radius:6px; cursor:pointer; font-weight:500; border:none; margin-top:4px; }
.btn-primary  { background:#111; color:#fff; }
.btn-secondary{ background:#f0efeb; color:#333; border:1px solid #ddd; }
.btn-special  { background:#78716c; color:#fff; }
.btn-checkout { background:#991b1b; color:#fff; }
.divider { height:1px; background:#eee; margin:2.5rem 0; }
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-box">
    <h2>HAY at IART</h2>
    <p>請輸入 IART 邀請碼</p>
    <input type="password" id="pw-input" placeholder="邀請碼">
    <button class="pw-btn" onclick="checkPassword()">進入</button>
    <p id="pw-error" style="color:red; display:none;">邀請碼錯誤</p>
  </div>
</div>

<div id="main-content" style="display:none;">
<header>
  <h1>HAY at IART</h1>
  <p class="sub">Exclusive Member Events</p>
  <div class="notice">
    <p><strong>1. 預約制：</strong>本頁面僅供「商品預約登記」，現場付款領貨。</p>
    <p><strong>2. 優先權：</strong>依預約表單送出時間順序為主。</p>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('t1',this)">限定組合</button>
  <button class="tab-btn" onclick="showTab('t2',this)">精選折扣區</button>
  <button class="tab-btn" onclick="showTab('t3',this)">所有商品</button>
</nav>

<div id="t1" class="tab-panel active">
  <div class="wrap">
    <p class="section-title">限定聯名組合</p>
    <div id="grid-t1a" class="grid-3"></div>
    <div class="divider"></div>
    <p class="section-title" id="t1b-title">IART 限定特惠組</p>
    <div id="grid-t1b" class="grid-2"></div>
  </div>
</div>

<div id="t2" class="tab-panel">
  <div class="wrap">
    <p class="section-title">精選促銷方案</p>
    <div id="grid-t2" class="grid-3"></div>
  </div>
</div>

<div id="t3" class="tab-panel">
  <div class="wrap">
    <p class="section-title">HAY 完整單品全集</p>
    <div id="grid-t3" class="grid-4"></div>
  </div>
</div>

<div id="cart-box" style="position:fixed;bottom:1.5rem;right:1.5rem;width:320px;background:#fff;border:2px solid #111;border-radius:10px;padding:1.25rem;box-shadow:0 8px 30px rgba(0,0,0,0.15);z-index:200;display:none;">
  <div id="cart-items" style="font-size:11px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;"></div>
  <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;border-top:1px solid #eee;padding-top:10px;">
    <span>總額</span><span id="cart-total">NT$ 0</span>
  </div>
  <button class="btn btn-checkout" onclick="checkout()">確認預訂並複製內容</button>
</div>
</div>

<script>
// ============================================================
// ★ 設定區：請將你的 CSV 網址填入下方
// ============================================================
var SHEET_URL = ''; 

// 備援資料：已移除 badge 欄位，並補完檔名
var DEMO_DATA = [
  {tab:'tab1a', name:'暖心呵護',    desc:'Crate(M) + 大毛巾 + 毛巾',                       price:2460, orig_price:'', colors:'籃子:淺黃,淡紫,鼠尾草綠,淺粉|毛巾系列:鋼鐵藍,薰衣草,抹茶綠', img:'combo_warm.jpg',    btn_style:'primary', section:''},
  {tab:'tab1a', name:'辦公療癒',    desc:'Tote Bag + Crate(M) + Barro Cup 杯子',           price:3260, orig_price:'', colors:'托特包:海軍藍,深橄欖,薰衣草|籃子:淺黃,淡紫,鼠尾草綠,淺粉', img:'combo_office.jpg',  btn_style:'primary', section:''},
  {tab:'tab1a', name:'午後食光',    desc:'Barro Plate Set of 2 (Ø24) + Barro Cup 杯子',   price:4200, orig_price:'', colors:'餐盤:米白,深藍,綠色|杯子:粉紅,天藍,大地',                  img:'combo_tea.jpg',     btn_style:'primary', section:''},
  {tab:'tab1b', name:'FREE SPIRIT 系列',    desc:'Tote Bag + Wash Bag + Slippers', price:1880, orig_price:'', colors:'款式:A款-群青藍,B款-罌粟紅', img:'free_spirit.jpg', btn_style:'special', section:'IART 限定特惠組'},
  {tab:'tab1b', name:'MODERN DWELLER 系列', desc:'Everyday Tote + Laptop Cover + 蛋寶',    price:3980, orig_price:'', colors:'款式:A款-深綠,B款-酒紅', img:'modern_dweller.jpg', btn_style:'special', section:'IART 限定特惠組'}
];

var selCounter = 0;

function buildSelects(colorsStr) {
  if (!colorsStr) return { html:'', ids:[] };
  var ids = [];
  var html = colorsStr.split('|').map(function(group) {
    var parts = group.split(':');
    var label = parts.length > 1 ? parts[0] : '選項';
    var opts  = (parts.length > 1 ? parts[1] : parts[0]).split(',');
    var sid   = 'sel_' + (++selCounter);
    ids.push(sid);
    var options = opts.map(function(o) {
      return '<option>' + o + '</option>';
    }).join('');
    return '<select id="' + sid + '"><option value="">選擇' + label + '</option>' + options + '</select>';
  }).join('');
  return { html:html, ids:ids };
}

function buildCard(item) {
  var sel     = buildSelects(item.colors);
  var btnCls  = 'btn-' + (item.btn_style || 'primary');
  var idsJson = JSON.stringify(sel.ids);

  // 判斷價格顯示
  var priceHtml = item.orig_price 
    ? '<div class="price-row"><span class="price-orig">NT$ ' + Number(item.orig_price).toLocaleString() + '</span><span class="price-disc">NT$ ' + Number(item.price).toLocaleString() + '</span></div>'
    : '<p class="price' + (item.btn_style === 'special' ? '-special' : '') + '">NT$ ' + Number(item.price).toLocaleString() + '</p>';

  return '<div class="card">'
    + '<div class="img-box"><img src="' + item.img + '" alt="' + item.name + '" onerror="this.src=\'https://via.placeholder.com/300?text=HAY\'"></div>'
    + '<h3>' + item.name + '</h3>'
    + (item.desc ? '<p class="desc">' + item.desc + '</p>' : '')
    + sel.html
    + priceHtml
    + '<button class="btn ' + btnCls + '" onclick=\'addToCart(' + JSON.stringify(item.name) + ',' + Number(item.price) + ',' + idsJson + ')\'>預訂</button>'
    + '</div>';
}

function renderAll(data) {
  var buckets = { tab1a:[], tab1b:[], tab2:[], tab3:[] };
  data.forEach(function(item) {
    var t = (item.tab || '').trim();
    if (buckets[t]) buckets[t].push(item);
  });

  document.getElementById('grid-t1a').innerHTML = buckets.tab1a.map(buildCard).join('');
  
  // 更新 Tab1b 標題
  if (buckets.tab1b.length > 0 && buckets.tab1b[0].section) {
      document.getElementById('t1b-title').textContent = buckets.tab1b[0].section;
  }
  document.getElementById('grid-t1b').innerHTML = buckets.tab1b.map(buildCard).join('');
  document.getElementById('grid-t2').innerHTML = buckets.tab2.map(buildCard).join('');
  document.getElementById('grid-t3').innerHTML = buckets.tab3.map(buildCard).join('');
}

function parseCSV(text) {
  var lines  = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var result  = [];
  for (var i = 1; i < lines.length; i++) {
    var row = [], cur = '', inQ = false;
    for (var c = 0; c < lines[i].length; c++) {
      var ch = lines[i][c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    var obj = {};
    headers.forEach(function(h, idx){ obj[h] = (row[idx] || '').replace(/^"|"$/g,''); });
    if (obj.tab) result.push(obj);
  }
  return result;
}

function loadData() {
  if (!SHEET_URL) { renderAll(DEMO_DATA); return; }
  fetch(SHEET_URL)
    .then(function(r){ return r.text(); })
    .then(function(t){ renderAll(parseCSV(t)); });
}

function checkPassword() {
  if (document.getElementById('pw-input').value === 'stork888') {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    loadData();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// 購物車邏輯保持不變...
var cart = [];
function addToCart(name, price, ids) {
  var colors = ids.map(function(id){
    var el = document.getElementById(id); return el ? el.value : '';
  }).filter(function(v){ return v && v.indexOf('選擇') !== 0; }).join(' / ');
  cart.push({ name:name, price:price, colors:colors });
  renderCart();
  document.getElementById('cart-box').style.display = 'block';
}

function renderCart() {
  var html = '', total = 0;
  cart.forEach(function(item){
    html += '<div style="display:flex;justify-content:space-between;border-bottom:1px solid #f5f5f5;padding-bottom:6px;">'
      + '<span>' + item.name + '<br><small style="color:#aaa;">' + item.colors + '</small></span>'
      + '<span>NT$' + item.price.toLocaleString() + '</span></div>';
    total += item.price;
  });
  document.getElementById('cart-items').innerHTML = html;
  document.getElementById('cart-total').textContent = 'NT$ ' + total.toLocaleString();
}

function checkout() {
  var text = '【HAY at IART 預訂清單】\n';
  cart.forEach(function(item){ text += '- ' + item.name + ' (' + item.colors + ') NT$ ' + item.price + '\n'; });
  navigator.clipboard.writeText(text).then(function(){
    alert('清單已複製！');
    window.open('你的Google表單網址','_blank');
  });
}
</script>
</body>
</html>
