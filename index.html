<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif; background:#F9F8F4; color:#333; font-size:14px; line-height:1.6; }

/* 密碼門 */
#pw-gate { position:fixed; inset:0; background:#F9F8F4; display:flex; align-items:center; justify-content:center; z-index:999; }
.pw-box { background:#fff; border:1px solid #ddd; border-radius:10px; padding:2.5rem 2rem; text-align:center; width:320px; }
.pw-box h2 { font-size:18px; font-weight:300; letter-spacing:0.2em; margin-bottom:6px; }
.pw-box p { font-size:12px; color:#999; margin-bottom:1.5rem; }
.pw-box input { width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px; font-family:inherit; margin-bottom:10px; text-align:center; letter-spacing:0.15em; }
.pw-box input:focus { outline:2px solid #333; }
.pw-btn { width:100%; padding:10px; background:#111; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; font-family:inherit; }
.pw-btn:hover { background:#333; }
#pw-error { color:#991b1b; font-size:12px; margin-top:10px; display:none; }

/* Header */
header { text-align:center; padding:3rem 1.5rem 1.5rem; background:#fff; border-bottom:1px solid #eee; }
header h1 { font-size:1.8rem; font-weight:300; letter-spacing:0.3em; margin-bottom:6px; }
header .sub { font-size:11px; color:#999; letter-spacing:0.15em; text-transform:uppercase; font-style:italic; }
.notice { max-width:560px; margin:1.2rem auto 0; background:#f5f4ef; border:1px solid #ddd; border-radius:8px; padding:1rem 1.25rem; font-size:12px; color:#555; line-height:1.9; text-align:left; }
.notice .notice-title { font-size:13px; font-weight:700; color:#333; margin-bottom:8px; }
.notice p { margin-bottom:4px; }

/* Nav */
nav { display:flex; justify-content:center; background:#fff; border-bottom:1px solid #eee; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.tab-btn { padding:14px 24px; font-size:13px; border:none; border-bottom:2px solid transparent; background:transparent; color:#888; cursor:pointer; font-family:inherit; transition:color 0.2s; }
.tab-btn:hover { color:#333; }
.tab-btn.active { color:#111; border-bottom-color:#111; font-weight:700; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* Layout */
.wrap { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
.section-title { text-align:center; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#aaa; margin-bottom:6px; }
.section-note { text-align:center; font-size:11px; color:#aaa; font-style:italic; margin-bottom:1.5rem; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:680px; margin:0 auto; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:860px){ .grid-3,.grid-4 { grid-template-columns:repeat(2,1fr); } }
@media(max-width:520px){ .grid-3,.grid-2,.grid-4 { grid-template-columns:1fr; } }

/* Card */
.card { background:#fff; border:1px solid #eee; border-radius:8px; padding:1.25rem; display:flex; flex-direction:column; gap:8px; transition:box-shadow 0.2s; }
.card:hover { box-shadow:0 6px 20px rgba(0,0,0,0.08); }
.img-box { background:#f3f4f6; border-radius:6px; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:4px; }
.img-box img { max-width:100%; max-height:100%; object-fit:contain; }
.card h3 { font-size:13px; font-weight:700; }
.card .desc { font-size:11px; color:#999; line-height:1.6; }

/* Badge（蛋寶聯名標籤）*/
.badge { display:inline-block; font-size:10px; background:#f5f0e8; color:#a08050; border:1px solid #e0d0b0; border-radius:4px; padding:2px 7px; margin-bottom:2px; }

/* Form */
select { width:100%; font-size:11px; padding:6px 8px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#333; font-family:inherit; cursor:pointer; }

/* Price */
.price { font-size:16px; font-weight:700; margin-top:auto; }
.price-row { display:flex; align-items:baseline; gap:8px; margin-top:auto; flex-wrap:wrap; }
.price-orig { font-size:12px; color:#bbb; text-decoration:line-through; }
.price-disc { font-size:16px; font-weight:700; color:#991b1b; }
.price-special { font-size:16px; font-weight:700; color:#78716c; }

/* Buttons */
.btn { width:100%; padding:9px 12px; font-size:11px; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:500; letter-spacing:0.05em; border:none; margin-top:4px; transition:opacity 0.15s; }

.btn-primary  { background:#111; color:#fff; }
.btn-secondary{ background:#f0efeb; color:#333; border:1px solid #ddd; }
.btn-special  { background:#78716c; color:#fff; }

.divider { height:1px; background:#eee; margin:2.5rem 0; }

// ============================================================
//  核心渲染邏輯（不需要修改以下內容）
// ============================================================
var selCounter = 0;

function buildSelects(colorsStr) {
  if (!colorsStr) return { html:'', ids:[] };
  var ids = [];
  var html = colorsStr.split('|').map(function(group) {
    var parts = group.split(':');
    var label = parts.length > 1 ? parts[0] : '顏色';
    var opts  = (parts.length > 1 ? parts[1] : parts[0]).split(',');
    var sid   = 'sel_' + (++selCounter);
    ids.push(sid);
    var options = opts.map(function(o) {
      var sold = o.indexOf('售完') !== -1;
      return '<option' + (sold ? ' style="color:#bbb;" disabled' : '') + '>'
        + (sold ? o + '（售完）' : o) + '</option>';
    }).join('');
    return '<select id="' + sid + '"><option value="">選擇' + label + '</option>' + options + '</select>';
  }).join('');
  return { html:html, ids:ids };
}

function buildCard(item) {
  var sel     = buildSelects(item.colors);
  var btnCls  = 'btn-' + (item.btn_style || 'primary');
  var btnText = item.orig_price ? '加入預訂' : '預訂';
  var idsJson = JSON.stringify(sel.ids);

  var priceHtml = item.orig_price
    ? '<div class="price-row"><span class="price-orig">NT$ ' + Number(item.orig_price).toLocaleString()
      + '</span><span class="price-disc">NT$ ' + Number(item.price).toLocaleString() + '</span></div>'
    : '<p class="price' + (item.btn_style === 'special' ? '-special' : '') + '">NT$ '
      + Number(item.price).toLocaleString() + '</p>';

  var badgeHtml = item.badge ? '<span class="badge">＋' + item.badge + '</span>' : '';
  var descHtml  = item.desc  ? '<p class="desc">' + item.desc + '</p>' : '';

  return '<div class="card">'
    + '<div class="img-box"><img src="' + item.img + '" alt="' + item.name
    + '" onerror="this.parentNode.style.background=\'#f3f4f6\'"></div>'
    + badgeHtml
    + '<h3>' + item.name + '</h3>'
    + descHtml
    + sel.html
    + priceHtml
    + '<button class="btn ' + btnCls + '" onclick=\'addToCart('
    + JSON.stringify(item.name) + ',' + Number(item.price) + ',' + idsJson + ')\'>'
    + btnText + '</button>'
    + '</div>';
}

function renderAll(data) {
  var buckets = { tab1a:[], tab1b:[], tab2:[], tab3:[] };
  data.forEach(function(item) {
    var t = (item.tab || '').trim();
    if (buckets[t]) buckets[t].push(item);
  });

  // Tab1a
  document.getElementById('grid-t1a').innerHTML = buckets.tab1a.map(buildCard).join('');

  // Tab1b — 讀取第一筆的 section 作為標題
  var t1bTitle = (buckets.tab1b[0] && buckets.tab1b[0].section) ? buckets.tab1b[0].section : 'IART 限定特惠組';
  document.getElementById('t1b-title').textContent = t1bTitle;
  document.getElementById('grid-t1b').innerHTML = buckets.tab1b.map(buildCard).join('');

  // Tab2 & Tab3
  document.getElementById('grid-t2').innerHTML = buckets.tab2.map(buildCard).join('');
  document.getElementById('grid-t3').innerHTML = buckets.tab3.map(buildCard).join('');
}

function parseCSV(text) {
  var lines  = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var result  = [];
  for (var i = 1; i < lines.length; i++) {
    // 處理帶引號的 CSV 欄位（逗號在引號內不切割）
    var row = [], cur = '', inQ = false;
    for (var c = 0; c < lines[i].length; c++) {
      var ch = lines[i][c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    var obj = {};
    headers.forEach(function(h, idx){ obj[h] = (row[idx] || '').replace(/^"|"$/g,''); });
    if (obj.tab) result.push(obj);
  }
  return result;
}

function loadData() {
  if (!SHEET_URL) { renderAll(DEMO_DATA); return; }
  fetch(SHEET_URL)
    .then(function(r){ return r.text(); })
    .then(function(t){ renderAll(parseCSV(t)); })
    .catch(function(){ console.warn('Sheet 載入失敗，使用預設資料'); renderAll(DEMO_DATA); });
}

// 購物車
var cart = [];
function addToCart(name, price, ids) {
  var colors = ids.map(function(id){
    var el = document.getElementById(id); return el ? el.value : '';
  }).filter(function(v){ return v && v.indexOf('選擇') !== 0; }).join(' / ');
  cart.push({ name:name, price:price, colors:colors });
  renderCart();
  document.getElementById('cart-box').style.display = 'block';
}
function renderCart() {
  var html = '', total = 0;
  cart.forEach(function(item){
    html += '<div style="display:flex;justify-content:space-between;border-bottom:1px solid #f5f5f5;padding-bottom:6px;gap:8px;">'
      + '<span><span style="font-weight:500;">' + item.name + '</span>'
      + (item.colors ? '<br><span style="color:#aaa;font-size:10px;">' + item.colors + '</span>' : '')
      + '</span><span style="white-space:nowrap;">NT$' + item.price.toLocaleString() + '</span></div>';
    total += item.price;
  });
  document.getElementById('cart-items').innerHTML = html;
  document.getElementById('cart-total').textContent = 'NT$ ' + total.toLocaleString();
}
function clearCart() {
  cart = []; renderCart();
  document.getElementById('cart-box').style.display = 'none';
}
function checkout() {
  var text = '【HAY at IART 預訂申請】\n';
  cart.forEach(function(item){ text += '- ' + item.name + ' (' + item.colors + ') NT$ ' + item.price + '\n'; });
  text += '\n總計金額：NT$ ' + cart.reduce(function(a,b){return a+b.price;},0).toLocaleString() + '\n\n※請將此內容貼上至表單備註。';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(function(){
        alert('清單已複製！即將轉往預訂表單。');
        window.open('https://docs.google.com/forms/d/e/1FAIpQLSfMJN09-IEJ-3DiNYYiqCWelztKaOmp305_hpbOMk0QG0watw/viewform?usp=sf_link','_blank');
      }).catch(function(){ alert('複製失敗，請手動複製：\n\n' + text); });
  } else {
    alert('請手動複製以下內容：\n\n' + text);
  }
}
</script>
